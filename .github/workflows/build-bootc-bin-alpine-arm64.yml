name: Build bootc binary image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "bootc version to build, for example v1.16.3 or latest"
        default: latest
        required: true
  schedule:
    - cron: "17 2 * * 5"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-bootc-bin-alpine-arm64.yml"
      - "experiments/alpine-bootc-pi5/bootc-bin/**"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/bootc-bin-alpine-arm64

jobs:
  build:
    runs-on: ubuntu-26.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq podman

      - name: Resolve bootc release
        id: release
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || 'latest' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$INPUT_VERSION" = "latest" ]; then
            tag="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/bootc-dev/bootc/releases/latest | jq -r .tag_name)"
          else
            tag="$INPUT_VERSION"
          fi
          version="${tag#v}"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building bootc v${version}"

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build bootc binary image
        working-directory: experiments/alpine-bootc-pi5
        run: |
          podman build \
            --platform linux/arm64 \
            --build-arg BOOTC_VERSION="${{ steps.release.outputs.version }}" \
            -t "${IMAGE}:${{ steps.release.outputs.tag }}" \
            -t "${IMAGE}:latest" \
            -f bootc-bin/Containerfile \
            bootc-bin

      - name: Push
        run: |
          podman push "${IMAGE}:${{ steps.release.outputs.tag }}"
          podman push "${IMAGE}:latest"
