name: Build bootc SD card image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/**
      - exp/**
    paths:
      - ".github/workflows/build-bootc-sdcard-image.yml"
      - "experiments/alpine-bootc-pi5/**"

permissions:
  contents: read
  packages: read

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/bootc-alpine-arm64
  TAG: latest

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools podman zstd

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build container image rootful
        working-directory: experiments/alpine-bootc-pi5
        run: |
          sudo podman build --platform linux/arm64 -t "${IMAGE}:${TAG}" -f Containerfile .

      - name: Build bootc SD card image
        working-directory: experiments/alpine-bootc-pi5
        run: |
          sudo IMAGE="${IMAGE}" TAG="${TAG}" TARGET_IMGREF="${IMAGE}:${TAG}" OUT=alpine-bootc-pi5.img SIZE=16G \
            scripts/build-bootc-sdcard-image.sh 2>&1 | tee bootc-sdcard-build.log
          sudo zstd -T0 -19 alpine-bootc-pi5.img -o alpine-bootc-pi5.img.zst
          sudo chown "$USER:$USER" alpine-bootc-pi5.img.zst bootc-sdcard-build.log

      - name: Upload SD card image
        uses: actions/upload-artifact@v5
        with:
          name: alpine-bootc-pi5-sdcard
          path: |
            experiments/alpine-bootc-pi5/alpine-bootc-pi5.img.zst
            experiments/alpine-bootc-pi5/bootc-sdcard-build.log
          if-no-files-found: error
