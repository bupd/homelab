name: Publish homelab cluster artifact

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  OCI_REPOSITORY: oci://ghcr.io/bupd/homelab/cluster

jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04@sha256:3131b4cc82a783df6c9df078f86e01819a13594b865c2cad47bd1bca2b7063bb
    steps:
      - name: Check out desired state
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3
        with:
          just-version: 1.56.0

      - name: Set up container runtime
        run: just ci-install-container-runtime

      - name: Validate desired state
        run: just validate

  publish:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    concurrency:
      group: homelab-cluster-artifact-${{ github.ref }}
      cancel-in-progress: false
    container:
      image: ubuntu:26.04@sha256:3131b4cc82a783df6c9df078f86e01819a13594b865c2cad47bd1bca2b7063bb
    steps:
      - name: Check out desired state
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3
        with:
          just-version: 1.56.0

      - name: Set up container runtime
        run: just ci-install-container-runtime

      - name: Publish immutable artifact and update latest
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          OCI_SOURCE: https://github.com/${{ github.repository }}
          OCI_REVISION: ${{ github.ref_name }}@sha1:${{ github.sha }}
          OCI_TAG: ${{ github.sha }}
          UPDATE_LATEST: ${{ github.ref == 'refs/heads/main' }}
        # Initial rollout intentionally contains no applications. Change this
        # scope only after the observability platform has been verified.
        run: just push-artifact platform/observability
