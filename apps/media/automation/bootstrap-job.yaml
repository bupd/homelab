apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: janitorr-config
  namespace: media
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: batch/v1
kind: Job
metadata:
  name: media-bootstrap-v15
  namespace: media
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-bootstrap
    spec:
      automountServiceAccountToken: false
      containers:
        - name: bootstrap
          image: docker.io/library/python:3.13-alpine@sha256:399babc8b49529dabfd9c922f2b5eea81d611e4512e3ed250d75bd2e7683f4b0
          command:
            - python3
            - /bootstrap/bootstrap.py
          envFrom:
            - secretRef:
                name: media-automation-credentials
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: bootstrap
              mountPath: /bootstrap
              readOnly: true
            - name: janitorr-config
              mountPath: /janitorr
            - name: media
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      nodeSelector:
        homelab.bupd.xyz/workload-pool: media
      restartPolicy: Never
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      volumes:
        - name: bootstrap
          configMap:
            name: media-bootstrap
            defaultMode: 0555
        - name: janitorr-config
          persistentVolumeClaim:
            claimName: janitorr-config
        - name: media
          persistentVolumeClaim:
            claimName: media-data
        - name: tmp
          emptyDir: {}
