controllers:
  main:
    replicas: 1
    strategy: Recreate
    initContainers:
      seed-config:
        image:
          repository: docker.io/library/busybox
          tag: 1.37.0
          digest: sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
        command: [/bin/sh, /bootstrap/seed-arr-config.sh]
        env:
          APP_PORT: "9696"
          CONFIG_UID: "1000"
          CONFIG_GID: "1000"
          API_KEY:
            valueFrom:
              secretKeyRef: {name: media-automation-credentials, key: PROWLARR_API_KEY}
          ADMIN_PASSWORD:
            valueFrom:
              secretKeyRef: {name: media-automation-credentials, key: ADMIN_PASSWORD}
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/prowlarr
          tag: version-2.4.0.5397
          digest: sha256:4fd7a166c8f46dd3370a871c250ee577d6c2ae97a0dbe0e3614b5ef736205620
        env: {PUID: "1000", PGID: "1000", TZ: Asia/Kolkata, UMASK: "002"}
        probes:
          liveness: &probe {enabled: true, type: HTTP, path: /ping, port: 9696}
          readiness: *probe
          startup:
            <<: *probe
            spec: {failureThreshold: 30, periodSeconds: 10}
        resources:
          requests: {cpu: 50m, memory: 128Mi}
          limits: {memory: 1Gi}
        securityContext:
          allowPrivilegeEscalation: false
          seccompProfile: {type: RuntimeDefault}
defaultPodOptions:
  nodeSelector: {homelab.bupd.xyz/workload-pool: media}
  securityContext: {fsGroup: 1000, fsGroupChangePolicy: OnRootMismatch}
service:
  main:
    controller: main
    ports:
      http: {port: 9696, primary: true, protocol: HTTP}
persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: local-path
    retain: true
    advancedMounts:
      main:
        main: [{path: /config}]
        seed-config: [{path: /config}]
  bootstrap:
    type: configMap
    name: media-bootstrap
    advancedMounts:
      main:
        seed-config:
          - {path: /bootstrap/seed-arr-config.sh, subPath: seed-arr-config.sh, readOnly: true}
  tmp: {type: emptyDir, globalMounts: [{path: /tmp}]}
