controllers:
  main:
    replicas: 1
    strategy: Recreate
    initContainers:
      seed-config:
        image:
          repository: docker.io/library/busybox
          tag: 1.37.0
          digest: sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
        command: [/bin/sh, /bootstrap/seed-arr-config.sh]
        env:
          APP_PORT: "8989"
          API_KEY:
            valueFrom:
              secretKeyRef:
                name: media-automation-credentials
                key: SONARR_API_KEY
          ADMIN_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: media-automation-credentials
                key: ADMIN_PASSWORD
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/sonarr
          tag: version-4.0.19.2979
          digest: sha256:24acea2956a0ccb11f103877d9f4f8576600fb34bff34820ed749c2256dab89f
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Asia/Kolkata
          UMASK: "002"
        probes:
          liveness: &probe
            enabled: true
            type: HTTP
            path: /ping
            port: 8989
          readiness: *probe
          startup:
            <<: *probe
            spec:
              failureThreshold: 30
              periodSeconds: 10
        resources:
          requests: {cpu: 50m, memory: 128Mi}
          limits: {memory: 1Gi}
        securityContext: &securityContext
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL]}
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile: {type: RuntimeDefault}
defaultPodOptions: &podOptions
  nodeSelector:
    homelab.bupd.xyz/workload-pool: media
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
service:
  main:
    controller: main
    ports:
      http: {port: 8989, primary: true, protocol: HTTP}
persistence:
  config: &config
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: local-path
    retain: true
    advancedMounts:
      main:
        main: [{path: /config}]
        seed-config: [{path: /config}]
  media:
    type: persistentVolumeClaim
    existingClaim: media-data
    globalMounts: [{path: /data}]
  bootstrap:
    type: configMap
    name: media-bootstrap
    advancedMounts:
      main:
        seed-config:
          - {path: /bootstrap/seed-arr-config.sh, subPath: seed-arr-config.sh, readOnly: true}
  tmp: {type: emptyDir, globalMounts: [{path: /tmp}]}
