apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: library
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Ti
  hostPath:
    path: /home/bupd/hdd/data/BUPD_Personal/immich
    type: Directory
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - media-worker
  persistentVolumeReclaimPolicy: Retain
  storageClassName: immich-library
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
  namespace: immich
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: library
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti
  storageClassName: immich-library
  volumeMode: Filesystem
  volumeName: immich-library
