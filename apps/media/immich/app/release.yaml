apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich-chart
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
  interval: 2m
  timeout: 15m
  upgrade:
    cleanupOnFail: true
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
  valuesFrom:
    - kind: ConfigMap
      name: immich-values
      valuesKey: values.yaml
