## This is the complete values file shipped with the Immich chart at version
## 0.13.1, with homelab overrides kept in place. The chart relies on the bjw-s
## common library chart 5.0.1 for additional supported top-level values.

# These entries are shared between all the Immich components.

defaultPodOptions:
  nodeSelector:
    homelab.bupd.xyz/workload-pool: media

controllers:
  main:
    containers:
      main:
        image:
          tag: v3.0.0
        env:
          REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
          IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
          # Database connection variables are component-specific below.

immich:
  metrics:
    # Enabling this creates ServiceMonitors for the Prometheus operator.
    enabled: true
  persistence:
    # Writable Immich-managed storage stays on the node's Linux filesystem.
    # The NTFS personal-media disk is mounted separately and read-only.
    library:
      existingClaim: immich-managed-library
  # immich-config.json represented as YAML.
  # ref: https://immich.app/docs/install/config-file/
  configuration:
    server:
      externalDomain: https://immich.tail6c5ea9.ts.net
    # trash:
    #   enabled: false
    #   days: 30
    # storageTemplate:
    #   enabled: true
    #   template: "{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}"
  configurationKind: ConfigMap
  # existingConfiguration:

# Dependencies

valkey:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            repository: docker.io/valkey/valkey
            tag: 9.1-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
            pullPolicy: IfNotPresent
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      size: 2Gi
      accessMode: ReadWriteOnce
      storageClass: local-path

# Immich components

server:
  enabled: true
  persistence:
    external-library:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: immich-external-library
      globalMounts:
        - path: /mnt/photos
          readOnly: true
  controllers:
    main:
      replicas: 1
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-server
            pullPolicy: IfNotPresent
          env:
            DB_HOSTNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: host
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: user
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: password
            DB_DATABASE_NAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: dbname
          resources:
            limits:
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
  ingress:
    main:
      enabled: false
      annotations:
        # Removes the body-size limit when an nginx ingress is added later.
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
      hosts:
        - host: immich.local
          paths:
            - path: "/"
              service:
                identifier: main
      tls: []

machine-learning:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-machine-learning
            pullPolicy: IfNotPresent
          env:
            TRANSFORMERS_CACHE: /cache
            HF_XET_CACHE: /cache/huggingface-xet
            MPLCONFIGDIR: /cache/matplotlib-config
          resources:
            limits:
              memory: 6Gi
            requests:
              cpu: 500m
              memory: 1Gi
  persistence:
    cache:
      enabled: true
      type: persistentVolumeClaim
      size: 20Gi
      accessMode: ReadWriteOnce
      storageClass: local-path
