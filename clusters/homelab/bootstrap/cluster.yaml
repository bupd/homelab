apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster
  namespace: flux-system
spec:
  interval: 2m
  path: ./clusters/homelab/cluster
  prune: true
  retryInterval: 30s
  sourceRef:
    kind: OCIRepository
    name: homelab
  # This root only applies child Flux Kustomizations. Each child owns its own
  # health checks and dependency ordering, so waiting here causes nested
  # Helm-install timeouts to surface as a misleading root timeout.
  timeout: 2m
  wait: false
