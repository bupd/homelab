apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-ui
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-operator
    - name: networking
  interval: 2m
  path: ./platform/flux-operator/instance
  prune: true
  retryInterval: 30s
  sourceRef:
    kind: OCIRepository
    name: homelab
  timeout: 12m
  wait: true
