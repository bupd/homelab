apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich-database
  namespace: flux-system
spec:
  dependsOn:
    - name: platform
  interval: 2m
  path: ./apps/media/immich/database
  prune: true
  retryInterval: 30s
  sourceRef:
    kind: OCIRepository
    name: homelab
  timeout: 15m
  wait: true
