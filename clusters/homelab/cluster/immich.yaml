apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: immich-database
    - name: networking
  interval: 2m
  path: ./apps/media/immich/app
  prune: true
  retryInterval: 30s
  sourceRef:
    kind: OCIRepository
    name: homelab
  # Immich is the terminal application boundary. Apply its HelmRelease and let
  # helm-controller own health, retries, and remediation. Waiting here can hold
  # an older values ConfigMap for the full Helm timeout after a failed install.
  timeout: 2m
  wait: false
