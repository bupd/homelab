apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
  namespace: flux-system
spec:
  dependsOn:
    - name: immich-database
  interval: 10m
  path: ./apps/media/immich/app
  prune: true
  retryInterval: 1m
  sourceRef:
    kind: OCIRepository
    name: homelab
  timeout: 15m
  wait: true

