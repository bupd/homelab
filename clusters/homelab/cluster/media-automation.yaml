apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-automation
  namespace: flux-system
spec:
  dependsOn:
    - name: jellyfin
    - name: networking
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  interval: 2m
  path: ./apps/media/automation
  prune: true
  retryInterval: 30s
  sourceRef:
    kind: OCIRepository
    name: homelab
  # This is a terminal application boundary. Apply new desired state promptly
  # and let helm-controller own health, retries, and recovery for each release.
  timeout: 2m
  wait: false
