apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  dependsOn:
    - name: nodes
  interval: 10m
  path: ./platform/controllers
  prune: true
  retryInterval: 1m
  sourceRef:
    kind: OCIRepository
    name: homelab
  timeout: 10m
  wait: true

