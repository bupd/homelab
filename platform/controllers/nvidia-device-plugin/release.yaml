apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
spec:
  chart:
    spec:
      chart: nvidia-device-plugin
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: nvidia-device-plugin
      version: 0.19.3
  install:
    remediation:
      retries: 3
  interval: 1h
  timeout: 10m
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  values:
    # The chart's default affinity requires Node Feature Discovery labels.
    # This cluster selects the known GPU node directly instead.
    affinity: null
    config:
      default: default
      map:
        default: |-
          version: v1
          flags:
            migStrategy: none
            failOnInitError: true
            plugin:
              deviceListStrategy: envvar
              deviceIDStrategy: uuid
          sharing:
            timeSlicing:
              renameByDefault: false
              failRequestsGreaterThanOne: true
              resources:
                - name: nvidia.com/gpu
                  replicas: 2
    gfd:
      enabled: false
    nodeSelector:
      kubernetes.io/hostname: media-worker
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 25m
        memory: 64Mi
    runtimeClassName: nvidia
