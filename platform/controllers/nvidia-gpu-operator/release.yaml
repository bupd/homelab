apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
  namespace: gpu-operator
spec:
  chart:
    spec:
      chart: gpu-operator
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: nvidia
      version: v26.3.3
  install:
    crds: Create
    remediation:
      retries: 3
  interval: 1h
  timeout: 15m
  upgrade:
    crds: CreateReplace
    remediation:
      remediateLastFailure: true
      retries: 3
  values:
    # Podman CDI passes the physical GPU and host driver into the nested
    # media-worker. The worker Quadlet also mounts the host's NVIDIA Container
    # Toolkit binaries, so K3s auto-detects the runtime at startup. Running the
    # operator toolkit DaemonSet here would SIGHUP nested containerd, which
    # causes the all-in-one K3s agent process to exit.
    driver:
      enabled: false
    cdi:
      enabled: false
    toolkit:
      enabled: false
    mig:
      strategy: none
    migManager:
      enabled: false
    devicePlugin:
      config:
        create: true
        default: default
        name: immich-gpu-sharing
        data:
          default: |-
            version: v1
            flags:
              migStrategy: none
              failOnInitError: true
              plugin:
                deviceListStrategy: envvar
                deviceIDStrategy: uuid
            sharing:
              timeSlicing:
                renameByDefault: false
                failRequestsGreaterThanOne: true
                resources:
                  - name: nvidia.com/gpu
                    replicas: 2
    dcgmExporter:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 30s
    nfd:
      enabled: false
