apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
  namespace: gpu-operator
spec:
  chart:
    spec:
      chart: gpu-operator
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: nvidia
      version: v26.3.3
  install:
    crds: Create
    remediation:
      retries: 3
  interval: 1h
  timeout: 15m
  upgrade:
    crds: CreateReplace
    remediation:
      remediateLastFailure: true
      retries: 3
  values:
    # Podman CDI already passes the physical GPU and host driver into the
    # nested media-worker. The operator must configure K3s's inner containerd.
    driver:
      enabled: false
    cdi:
      enabled: false
    toolkit:
      enabled: true
      env:
        - name: CONTAINERD_CONFIG
          value: /var/lib/rancher/k3s/agent/etc/containerd/config.toml
        - name: CONTAINERD_SOCKET
          value: /run/k3s/containerd/containerd.sock
        - name: RUNTIME_CONFIG_SOURCE
          value: file
        - name: CONTAINERD_RUNTIME_CLASS
          value: nvidia
        - name: CONTAINERD_SET_AS_DEFAULT
          value: "false"
    mig:
      strategy: none
    migManager:
      enabled: false
    devicePlugin:
      config:
        create: true
        default: default
        name: immich-gpu-sharing
        data:
          default: |-
            version: v1
            flags:
              migStrategy: none
              failOnInitError: true
              plugin:
                deviceListStrategy: envvar
                deviceIDStrategy: uuid
            sharing:
              timeSlicing:
                renameByDefault: false
                failRequestsGreaterThanOne: true
                resources:
                  - name: nvidia.com/gpu
                    replicas: 2
    dcgmExporter:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 30s
    nfd:
      enabled: true
