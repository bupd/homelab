apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - source.yaml
  - release.yaml

configMapGenerator:
  - name: flux-operator-values
    namespace: flux-system
    files:
      - values.yaml
    options:
      labels:
        reconcile.fluxcd.io/watch: Enabled

generatorOptions:
  disableNameSuffixHash: true
