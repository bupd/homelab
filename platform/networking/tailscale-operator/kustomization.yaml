apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - repository.yaml
  - release.yaml

configMapGenerator:
  - name: tailscale-operator-values
    namespace: tailscale
    files:
      - values.yaml
    options:
      labels:
        reconcile.fluxcd.io/watch: Enabled

generatorOptions:
  disableNameSuffixHash: true
